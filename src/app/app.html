<style>
  :host {
    font-family: var(--cd-font-mono);
    display: block;
    min-height: 100dvh;
  }
  .app-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 0.75rem 1.5rem;
    background: color-mix(in srgb, var(--cd-surface) 82%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--cd-border);
    box-shadow: 0 0 22px color-mix(in srgb, var(--cd-primary) 18%, transparent);
  }
  /* Brand: neon cyan wordmark with a subtle glitch on hover */
  .app-nav .brand {
    position: relative;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--cd-accent);
    text-shadow: var(--cd-glow-cyan);
  }
  .app-nav .brand:hover {
    animation: brand-glitch 0.35s steps(2, end) 2;
  }
  @media (prefers-reduced-motion: reduce) {
    .app-nav .brand:hover {
      animation: none;
    }
  }
  @keyframes brand-glitch {
    0% {
      transform: translate(0, 0);
      text-shadow: var(--cd-glow-cyan);
    }
    25% {
      transform: translate(-1px, 1px);
      text-shadow:
        -2px 0 var(--cd-secondary),
        2px 0 var(--cd-primary);
    }
    50% {
      transform: translate(1px, -1px);
      text-shadow:
        2px 0 var(--cd-secondary),
        -2px 0 var(--cd-primary);
    }
    100% {
      transform: translate(0, 0);
      text-shadow: var(--cd-glow-cyan);
    }
  }
  .app-nav nav {
    display: flex;
    gap: 1rem;
  }
  .app-nav a {
    position: relative;
    padding: 0.25rem 0.1rem;
    font-size: 0.875rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--cd-on-bg-muted);
    transition:
      color 0.2s,
      text-shadow 0.2s;
  }
  .app-nav a:hover {
    color: var(--cd-accent);
  }
  /* Active nav item: neon indicator underline */
  .app-nav a.active {
    color: var(--cd-primary);
    text-shadow: var(--cd-glow-blue);
  }
  .app-nav a.active::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    bottom: -0.35rem;
    height: 2px;
    background: var(--cd-primary);
    box-shadow: var(--cd-glow-blue);
  }
</style>

<header class="app-nav">
  <a routerLink="/" class="brand">{{ title() }}</a>
  <nav>
    <a routerLink="/cards" routerLinkActive="active">Collection</a>
  </nav>
</header>

<main class="app-main">
  <router-outlet />
</main>
