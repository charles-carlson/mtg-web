<section class="cards-page">
  <div class="search-menu">
    <button
      class="reload-btn"
      (click)="cardsResource.reload()"
      aria-label="Reload"
      title="Reload"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
    <app-card-search-bar [(value)]="name" />
    <app-card-filter-dropdown (apply)="onFilterApply($event)" />
  </div>

  <div class="card-grid">
    @if (cardsResource.error()) {
    <p class="grid-status grid-error">gRPC error: {{ cardsResource.error() }}</p>
    } @else if (cardsResource.isLoading()) {
    <p class="grid-status grid-loading">Loading…</p>
    } @else { @if(cardsResource.hasValue()){ @for (c of cardsResource.value() ?? []; track c.name +
    c.set + c.number) {
    <app-card-item [card]="c" [priority]="$index < 6" />
    } } }
  </div>
</section>
